/* ---------- Sunrise arc: the signature progress element ---------- */
function SunriseArc({ pct = 0, size = 96, color = "#F5A742", strokeWidth = 8 }) {
  const r = (size - strokeWidth) / 2;
  const cx = size / 2;
  const cy = size / 2;
  const circumference = Math.PI * r;
  const dash = (pct / 100) * circumference;
  const sunY = cy - (pct / 100) * (r * 0.72);
  const sunX = cx - r * 0.9 + (pct / 100) * (r * 1.8);
  const gradId = "sky-" + color.replace("#", "");

  return (
    <svg width={size} height={size / 2 + strokeWidth} viewBox={`0 0 ${size} ${size / 2 + strokeWidth}`}>
      <defs>
        <linearGradient id={gradId} x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%" stopColor="#2D3350" />
          <stop offset="100%" stopColor={color} />
        </linearGradient>
      </defs>
      <path d={`M ${strokeWidth / 2} ${cy} A ${r} ${r} 0 0 1 ${size - strokeWidth / 2} ${cy}`}
            fill="none" stroke="#232840" strokeWidth={strokeWidth} strokeLinecap="round" />
      <path d={`M ${strokeWidth / 2} ${cy} A ${r} ${r} 0 0 1 ${size - strokeWidth / 2} ${cy}`}
            fill="none" stroke={`url(#${gradId})`} strokeWidth={strokeWidth} strokeLinecap="round"
            strokeDasharray={`${dash} ${circumference}`} style={{ transition: "stroke-dasharray 0.6s ease" }} />
      <circle cx={sunX} cy={Math.max(sunY, strokeWidth)} r={size * 0.075} fill={color}>
        <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite" />
      </circle>
    </svg>
  );
}

  );
}

function Badge({ children, tone = "default" }) {

    teal: { bg: "rgba(79,182,168,0.14)", fg: "#4FB6A8" },

  return (
    <span style={{ background: t.bg, color: t.fg, fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: "0.04em", textTransform: "uppercase", padding: "3px 9px", borderRadius: 999, fontWeight: 600 }}>
      {children}
    </span>
  );
}

function useIsNarrow() {

    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return narrow;
}

            <div style={{ fontSize: 28, marginBottom: 10 }}>{b.icon}</div>
            <div style={{ fontFamily: "'Fraunces', serif", fontSize: 16, color: "#F0EDE4", marginBottom: 4 }}>{b.title}</div>
            <div style={{ fontSize: 12.5, color: "#8890AC" }}>{b.desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CourseDetailView({ course, onBack }) {
  const [activeIdx, setActiveIdx] = useState(() => {
    const idx = course.modules.findIndex((m) => m.active);
    return idx >= 0 ? idx : 0;
  });
  const activeModule = course.modules[activeIdx];
  return (
    <div style={{ padding: "24px 28px 60px" }}>
      <button onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", color: "#8890AC", cursor: "pointer", fontSize: 13.5, marginBottom: 18, fontFamily: "inherit", padding: 0 }}>
        <ChevronLeft size={16} /> Back to courses
      </button>
      <div style={{ display: "flex", gap: 24, flexWrap: "wrap", marginBottom: 8 }}>
        <div style={{ flex: "2 1 480px" }}>
          <div style={{ background: `linear-gradient(135deg, #191D2B, ${course.color}15)`, border: "1px solid #232840", borderRadius: 18, aspectRatio: "16/9", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 18, position: "relative", overflow: "hidden" }}>
            <PlayCircle size={64} color={course.color} style={{ cursor: "pointer" }} />
            <div style={{ position: "absolute", bottom: 14, left: 18, right: 18 }}>
              <div style={{ fontSize: 12, color: "#8890AC", marginBottom: 6, fontFamily: "'IBM Plex Mono', monospace" }}>{activeModule.minutes} min</div>
              <ProgressBar pct={38} color={course.color} />
            </div>
          </div>
          <Badge tone="amber">{course.category}</Badge>
          <h1 style={{ margin: "12px 0 6px", fontFamily: "'Fraunces', serif", fontSize: 26, color: "#F0EDE4" }}>{activeModule.title}</h1>
          <p style={{ margin: 0, color: "#8890AC", fontSize: 14.5, lineHeight: 1.6 }}>
            Part of <strong style={{ color: "#F0EDE4" }}>{course.title}</strong> with {course.mentor}. Watch the lesson, then mark it complete to keep your sunrise arc climbing.
          </p>
          <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
            <button style={{ background: course.color, color: "#12141C", border: "none", padding: "11px 20px", borderRadius: 10, fontWeight: 600, fontSize: 13.5, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 7 }}>
              <CheckCircle2 size={16} /> Mark lesson complete
            </button>
            <button style={{ background: "transparent", color: "#8890AC", border: "1px solid #232840", padding: "11px 20px", borderRadius: 10, fontWeight: 500, fontSize: 13.5, cursor: "pointer", fontFamily: "inherit" }}>
              Download notes
            </button>
          </div>
        </div>
        <div style={{ flex: "1 1 280px", background: "#191D2B", border: "1px solid #232840", borderRadius: 16, padding: 18, height: "fit-content" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
            <span style={{ fontFamily: "'Fraunces', serif", fontSize: 16, color: "#F0EDE4" }}>Course content</span>
            <SunriseArc pct={course.progress} size={56} color={course.color} strokeWidth={5} />
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
            {course.modules.map((m, i) => (
              <button key={m.title} onClick={() => setActiveIdx(i)} style={{ display: "flex", alignItems: "center", gap: 10, textAlign: "left", padding: "10px 8px", borderRadius: 10, border: "none", cursor: "pointer", background: i === activeIdx ? "#1E2230" : "transparent", fontFamily: "inherit" }}>
                {m.done ? <CheckCircle2 size={17} color="#4FB6A8" style={{ flexShrink: 0 }} /> : <CircleIcon size={17} color="#8890AC" style={{ flexShrink: 0 }} />}
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, color: i === activeIdx ? "#F0EDE4" : "#C7C9D9", fontWeight: i === activeIdx ? 600 : 400 }}>{m.title}</div>
                  <div style={{ fontSize: 11, color: "#8890AC", fontFamily: "'IBM Plex Mono', monospace" }}>{m.minutes} min</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function AmkaSkillsLMS() {
  const [view, setView] = useState("dashboard");
  const [openCourseId, setOpenCourseId] = useState(null);
  const [mobileOpen, setMobileOpen] = useState(false);
  const narrow = useIsNarrow();

  const openCourse = (id) => setOpenCourseId(id);
  const closeCourse = () => setOpenCourseId(null);
  const openedCourse = useMemo(() => COURSES.find((c) => c.id === openCourseId), [openCourseId]);

  let content;
  if (openedCourse) content = <CourseDetailView course={openedCourse} onBack={closeCourse} />;
  else if (view === "dashboard") content = <DashboardView courses={COURSES} onOpen={openCourse} />;
  else if (view === "courses") content = <CoursesView courses={COURSES} onOpen={openCourse} />;
  else if (view === "explore") content = <ExploreView courses={COURSES} onOpen={openCourse} />;
  else if (view === "achievements") content = <AchievementsView />;

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "#10131C", fontFamily: "'Inter', sans-serif" }}>
      <Sidebar active={view} setActive={(v) => { setView(v); setOpenCourseId(null); }} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} narrow={narrow} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <TopBar onMenu={() => setMobileOpen(true)} name="Brian" narrow={narrow} />
        {content}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AmkaSkillsLMS />);
</script>
</body>
</html>
